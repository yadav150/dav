<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found · Yadav Web Tools</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== HEADER (no nav links) ===== -->
    <header class="site-header" role="banner">
        <div class="header-inner">
            <a href="https://yadav150.github.io/dav/index.html" class="site-title">Yadav Web Tools</a>
        </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main id="main-content">

        <section class="section tools-section" aria-labelledby="tool-heading">
            <div class="section-title-bar">
                <h2 id="tool-heading">404 - Page Not Found</h2>
            </div>
            <div class="section-body">
                <div class="content-box" style="text-align:center;padding:40px 20px;">

                    <div style="font-size:6rem;font-weight:700;color:#1a5c3a;line-height:1.2;margin-bottom:8px;letter-spacing:-4px;">
                        404
                    </div>

                    <h3 style="font-size:1.5rem;color:#1e3d2f;margin:0 0 12px 0;font-weight:600;">
                        Oops! This page went missing.
                    </h3>

                    <p style="font-size:1rem;color:#4a6b5a;max-width:520px;margin:0 auto 8px auto;line-height:1.6;">
                        The page you are looking for might have been moved, deleted, or never existed.
                    </p>

                    <p style="font-size:1rem;color:#4a6b5a;max-width:520px;margin:0 auto 24px auto;line-height:1.6;">
                        <span style="background:#f4f8f6;padding:4px 14px;border-radius:8px;border:1px solid #d4e4dc;display:inline-block;font-weight:500;color:#1a5c3a;">
                            This page is either under maintenance or currently in development.
                        </span>
                    </p>

                    <a href="https://yadav150.github.io/dav/index.html" class="btn" style="min-width:180px;padding:12px 32px;font-size:1.05rem;">
                        Return to Homepage
                    </a>

                </div>
            </div>
        </section>

        <div class="spacer"></div>

    </main>

    <!-- ===== FOOTER (no links, just copyright) ===== -->
    <footer class="site-footer" role="contentinfo">
        <div class="footer-inner" style="justify-content:center;">
            <p class="footer-copy">&copy; 2026 Yadav Web Tools. All rights reserved.</p>
        </div>
    </footer>

    <!-- ===== GLOBAL SCRIPTS ===== -->
    <script src="script.js"></script>

</body>
</html>
