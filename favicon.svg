<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a5c3a;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#0d3d28;stop-opacity:1" />
        </linearGradient>
    </defs>
    <rect width="100" height="100" rx="20" ry="20" fill="url(#grad)"/>
    
    <!-- Text "Y" -->
    <text x="50" y="72" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle">Y</text>
</svg>
