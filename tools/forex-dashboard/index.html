<!-- ===== CONTROLS ===== -->
<div class="forex-controls">
    <div class="field-group" style="flex:1;min-width:180px;margin:0;">
        <label for="pairSelect" style="min-width:auto;font-weight:500;font-size:.9rem;">Currency Pair</label>
        <select id="pairSelect" class="resizer-select" style="flex:1;min-width:140px;">
            <option value="EUR/USD">EUR/USD</option>
            <option value="GBP/USD">GBP/USD</option>
            <option value="USD/JPY">USD/JPY</option>
            <option value="USD/INR">USD/INR</option>
            <option value="AUD/USD">AUD/USD</option>
            <option value="USD/CAD">USD/CAD</option>
        </select>
    </div>
    <div class="timeframe-selector" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
        <button type="button" class="tf-btn" data-period="1D">1D</button>
        <button type="button" class="tf-btn active" data-period="1W">1W</button>
        <button type="button" class="tf-btn" data-period="1M">1M</button>
        <button type="button" class="tf-btn" data-period="3M">3M</button>
        <button type="button" class="tf-btn" data-period="1Y">1Y</button>
        <button type="button" class="tf-btn refresh-btn" id="refreshBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;">
                <polyline points="23 4 23 10 17 10"/>
                <polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Refresh
        </button>
    </div>
</div>
